name: flutter_file_hash
description: "Flutter FFI file hashing powered by a Zig native core."
version: 0.0.1
repository: https://github.com/Preeternal/flutter-file-hash

environment:
  sdk: ^3.12.2
  flutter: '>=3.3.0'

dependencies:
  code_assets: ^1.2.1
  ffi: ^2.1.4
  flutter:
    sdk: flutter
  hooks: ^2.0.2
  logging: ^1.3.0

dev_dependencies:
  ffigen: ^20.1.1
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  test: ^1.28.0

flutter:
  plugin:
    platforms:
      android:
        package: com.preeternal.flutter_file_hash
        pluginClass: FlutterFileHashPlugin
        ffiPlugin: true
